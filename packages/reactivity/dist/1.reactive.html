<!DOCTYPE html>
<html lang="en">

    <title>Document</title>

  <body>
    <div id="app"></div>
    <script type="module">
      // import {

      import { reactive, effect } from "./reactivity.js";

      const state = reactive({ name: "xz", age: 10 });

      // 2.effect所有的渲染都是基于它来实现的
      effect(() => {
        // 默认先执行一次
        app.innerHTML = state.name + state.age;
        // effect(() => {
        //   // 默认先执行一次
        //   app.innerHTML = state.name;
        // });
      });
      setTimeout(() => {
        state.name = '大大大啊'
      }, 1000)
