      import { reactive, effect } from "./reactivity.js";

      const state = reactive({ name: "xz", address: { n: '123'} });

      const runner = effect(
        () => {
          console.log("runner");
          app.innerHTML = state.address.n;
        },

          scheduler: () => {
            setTimeout(() => {
              runner();
            }, 1000);

      );
      
        setTimeout(() => {
          state.address.n = 3030
        })
